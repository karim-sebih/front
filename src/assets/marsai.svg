<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="marsAI logo">
  <defs>
    <linearGradient id="gMars" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF5A3D"/>
      <stop offset="1" stop-color="#B00020"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#29B6F6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ICON -->
  <g transform="translate(90,60)" filter="url(#softShadow)">
    <!-- Mars planet -->
    <circle cx="120" cy="120" r="92" fill="url(#gMars)"/>
    <!-- Subtle craters -->
    <circle cx="85" cy="95" r="10" fill="#FFFFFF" opacity="0.12"/>
    <circle cx="145" cy="145" r="14" fill="#FFFFFF" opacity="0.10"/>
    <circle cx="155" cy="95" r="7" fill="#FFFFFF" opacity="0.10"/>
    <!-- Orbit ring -->
    <ellipse cx="120" cy="120" rx="132" ry="64" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="10"/>
    <!-- Small satellite dot -->
    <circle cx="232" cy="120" r="9" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(360,120)">
    <text x="0" y="110"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="140"
      font-weight="700"
      letter-spacing="-2"
      fill="#111827">mars</text>

    <text x="355" y="110"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="140"
      font-weight="800"
      letter-spacing="-2"
      fill="url(#gAI)">AI</text>

    <!-- Underline accent -->
    <rect x="6" y="138" width="520" height="10" rx="5" fill="#111827" opacity="0.12"/>
    <rect x="356" y="138" width="170" height="10" rx="5" fill="url(#gAI)" opacity="0.9"/>
  </g>
</svg>

